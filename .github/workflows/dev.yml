name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: 准备打包环境
        uses: docker/setup-buildx-action@v3

      - name: 准备代码
        uses: actions/checkout@v4
      
      - name: 打包Docker镜像
        run: |
          docker build . --file Dockerfile --tag capcut-mate:latest
