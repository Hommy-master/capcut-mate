name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: 准备代码
        uses: actions/checkout@v4

      - name: 准备python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyminifier  # 安装混淆工具
          pip install -r <(uv export)  # 安装项目依赖（如需测试）

      - name: 准备目录
        run: mkdir -p obfuscated

      - name: 执行代码混淆
        run: |
          # 混淆主程序
          pyminifier --obfuscate --destdir obfuscated main.py
          
          # 混淆src目录（保持目录结构）
          find src -name "*.py" -exec sh -c '
            for file do
              mkdir -p obfuscated/$(dirname "$file")
              pyminifier --obfuscate --destdir obfuscated/$(dirname "$file") "$file"
            done
          ' sh {} +

      - name: 查看文件和目录结构
        run: ls -lh -R obfuscated      
        
      - name: 准备打包Docker镜像的环境
        uses: docker/setup-buildx-action@v3

      - name: 打包Docker镜像
        run: |
          docker build . --file Dockerfile --tag capcut-mate:latest
